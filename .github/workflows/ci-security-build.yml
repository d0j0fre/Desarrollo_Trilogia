name: CI Security Build

on:
  push:
    branches: [main, Danny]
  pull_request:
    branches: [main, Danny]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Scan tracked files for secrets
        shell: pwsh
        run: ./Trilogia-Cursos/scripts/security/Test-RepositorySecrets.ps1
      - name: Restore solution
        run: dotnet restore ./Trilogia-Cursos/Proyecto_Final.slnx
      - name: Build solution
        run: dotnet build ./Trilogia-Cursos/Proyecto_Final.slnx --configuration Release --no-restore
